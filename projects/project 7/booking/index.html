<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book a Session | Photography Portfolio</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="booking-page">
        <section class="booking-card">
            <h1>Contact Me / Booking</h1>
            <p class="intro">
                Ready to schedule a session? Fill out the form below and I will reach out with available dates, location options, and next steps.
            </p>

            <form class="booking-form" action="#" method="post">
                <label for="name">Full Name</label>
                <input id="name" name="name" type="text" required>

                <label for="email">Email</label>
                <input id="email" name="email" type="email" required>

                <label for="phone">Phone Number</label>
                <input id="phone" name="phone" type="tel">

                <label for="sessionType">Session Type</label>
                <select id="sessionType" name="sessionType" required>
                    <option value="" selected disabled>Select a session</option>
                    <option value="mini">Mini</option>
                    <option value="standard">Standard</option>
                    <option value="deluxe">Deluxe</option>
                    <option value="other">Other</option>
                </select>

                <label for="message">Details</label>
                <textarea id="message" name="message" rows="5" placeholder="Tell me your preferred date range, location ideas, and any special requests."></textarea>

                <button type="submit">Send Booking Request</button>
            </form>

            <p class="contact-note">Or email directly: <a href="mailto:jacob@example.com">jacob@example.com</a></p>
            <p><a class="back-link" href="../index.html">← Back to Portfolio</a></p>
        </section>
    </main>
</body>
</html>
